services:
  mysql:
    image: mysql:8.0
    container_name: hospital_mysql_local
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Victini1     
      MYSQL_DATABASE: hospital_db        

    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: